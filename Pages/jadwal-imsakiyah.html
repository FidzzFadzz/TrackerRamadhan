<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Imsakiyah - Aplikasi Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(to bottom, #DFEFF6 0%, #ffffff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        
        <!-- Header -->
        <div class="px-6 pt-6 pb-4" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="flex items-center gap-4 mb-4">
                <button onclick="window.history.back()" class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-arrow-left text-white text-lg"></i>
                </button>
                <div>
                    <h1 class="text-white text-lg font-semibold">Jadwal Imsakiyah</h1>
                    <p class="text-white text-xs opacity-90">Sesuai dengan zona waktu lokasmu</p>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="px-6 py-6 pb-24">
            
            <!-- Jadwal Hari Ini -->
            <div class="mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-gray-700 font-semibold text-sm" style="color: #165273;">JADWAL HARI INI</h2>
                    <span class="text-gray-400 text-xs">04 Mar 2026</span>
                </div>

                <!-- Prayer Times Grid -->
                <div class="grid grid-cols-3 gap-3">
                    <!-- Imsak -->
                    <div class="rounded-2xl p-4 text-center shadow-sm" style="background-color: #DFEFF6;">
                        <i class="fas fa-moon text-2xl mb-2" style="color: #165273;"></i>
                        <p class="text-gray-500 text-xs mb-1">IMSAK</p>
                        <p class="text-gray-800 font-bold text-lg">04:26</p>
                        <p class="text-gray-400 text-xs mt-1">TERLEWAT</p>
                    </div>

                    <!-- Subuh -->
                    <div class="rounded-2xl p-4 text-center shadow-sm" style="background-color: #DFEFF6;">
                        <i class="fas fa-sun text-2xl mb-2" style="color: #437C9F;"></i>
                        <p class="text-gray-500 text-xs mb-1">SUBUH</p>
                        <p class="text-gray-800 font-bold text-lg">04:36</p>
                        <p class="text-gray-400 text-xs mt-1">TERLEWAT</p>
                    </div>

                    <!-- Dzuhur -->
                    <div class="rounded-2xl p-4 text-center shadow-sm" style="background-color: #DFEFF6;">
                        <i class="fas fa-sun text-2xl mb-2" style="color: #f57c00;"></i>
                        <p class="text-gray-500 text-xs mb-1">DZUHUR</p>
                        <p class="text-gray-800 font-bold text-lg">12:01</p>
                        <p class="text-gray-400 text-xs mt-1">TERLEWAT</p>
                    </div>

                    <!-- Ashar -->
                    <div class="rounded-2xl p-4 text-center shadow-sm border-2" style="background-color: #DFEFF6; border-color: #428686;">
                        <i class="fas fa-sun text-2xl mb-2" style="color: #f57c00;"></i>
                        <p class="text-gray-500 text-xs mb-1">ASHAR</p>
                        <p class="font-bold text-lg" style="color: #428686;">15:05</p>
                        <p class="text-xs mt-1 px-2 py-1 rounded-full inline-block" style="background-color: #c8f7f0; color: #428686;">-3m 16d</p>
                    </div>

                    <!-- Maghrib -->
                    <div class="rounded-2xl p-4 text-center shadow-sm" style="background-color: #DFEFF6;">
                        <i class="fas fa-moon text-2xl mb-2" style="color: #ec407a;"></i>
                        <p class="text-gray-500 text-xs mb-1">MAGHRIB</p>
                        <p class="text-gray-800 font-bold text-lg">18:08</p>
                        <p class="text-gray-400 text-xs mt-1">TERLEWAT</p>
                    </div>

                    <!-- Isya -->
                    <div class="rounded-2xl p-4 text-center shadow-sm" style="background-color: #DFEFF6;">
                        <i class="fas fa-moon text-2xl mb-2" style="color: #215472;"></i>
                        <p class="text-gray-500 text-xs mb-1">ISYA</p>
                        <p class="text-gray-800 font-bold text-lg">19:17</p>
                        <p class="text-gray-400 text-xs mt-1">TERLEWAT</p>
                    </div>
                </div>
            </div>

            <!-- Jadwal Mendatang -->
            <div>
                <div class="flex items-center gap-2 mb-4">
                    <i class="fas fa-calendar" style="color: #165273;"></i>
                    <h2 class="text-gray-700 font-semibold text-sm" style="color: #165273;">JADWAL MENDATANG</h2>
                </div>

                <div class="space-y-3" id="jadwalMendatang">
                    <!-- Generated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 shadow-lg" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="max-w-md mx-auto">
                <div class="flex justify-around items-center py-4 px-6">
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition" onclick="window.location.href='kalender.html'">
                        <i class="fas fa-calendar-alt text-xl"></i>
                        <span class="text-xs">Kalender</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white" onclick="window.location.href='../index.html'">
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center -mt-8 shadow-lg">
                            <i class="fas fa-home text-2xl" style="color: #165273;"></i>
                        </div>
                        <span class="text-xs mt-1">Home</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition">
                        <i class="fas fa-user-circle text-xl"></i>
                        <span class="text-xs">Profil</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script src="../script.js"></script>
    <script src="../navbar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Configuration for Makassar
            const city = 'Makassar';
            const country = 'Indonesia';
            const method = 11; // 11 is Majlis Ugama Islam Singapura, or we can use 20 for Kemenag
            
            // Elements
            const jadwalContainer = document.getElementById('jadwalMendatang');
            const hariMasehiEl = document.querySelector('.mb-6 span.text-gray-400.text-xs');
            const grids = document.querySelectorAll('.grid-cols-3 > div');
            
            const hari = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const bulan = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
            
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth() + 1;
            
            // Set header date
            hariMasehiEl.textContent = `${today.getDate().toString().padStart(2, '0')} ${bulan[today.getMonth()]} ${year}`;
            
            // Fetch API
            fetch(`https://api.aladhan.com/v1/calendarByCity/${year}/${month}?city=${city}&country=${country}&method=${method}`)
                .then(response => response.json())
                .then(data => {
                    const allDays = data.data;
                    const todayData = allDays[today.getDate() - 1];
                    const timings = todayData.timings;
                    
                    // Format Timings: Remove timezone string like "(WIB)"
                    const getCleanTime = (timeStr) => timeStr.split(' ')[0];
                    
                    const imsak = getCleanTime(timings.Imsak);
                    const subuh = getCleanTime(timings.Fajr);
                    const dzuhur = getCleanTime(timings.Dhuhr);
                    const ashar = getCleanTime(timings.Asr);
                    const maghrib = getCleanTime(timings.Maghrib);
                    const isya = getCleanTime(timings.Isha);
                    
                    const prayerTimes = [
                        { name: 'IMSAK', time: imsak, el: grids[0] },
                        { name: 'SUBUH', time: subuh, el: grids[1] },
                        { name: 'DZUHUR', time: dzuhur, el: grids[2] },
                        { name: 'ASHAR', time: ashar, el: grids[3] },
                        { name: 'MAGHRIB', time: maghrib, el: grids[4] },
                        { name: 'ISYA', time: isya, el: grids[5] }
                    ];

                    const nowInMinutes = today.getHours() * 60 + today.getMinutes();
                    let nextPrayerFound = false;
                    
                    // Update Today's Grid
                    prayerTimes.forEach(prayer => {
                        const timeParts = prayer.time.split(':');
                        const prayerMinutes = parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]);
                        
                        // Update time text
                        prayer.el.querySelector('p.font-bold').textContent = prayer.time;
                        
                        const statusEl = prayer.el.querySelectorAll('p')[2];
                        
                        if (nowInMinutes > prayerMinutes) {
                            // Passed
                            statusEl.textContent = 'TERLEWAT';
                            statusEl.className = 'text-gray-400 text-xs mt-1';
                            prayer.el.style.borderColor = 'transparent';
                            prayer.el.classList.remove('border-2');
                        } else if (!nextPrayerFound) {
                            // Next Prayer
                            nextPrayerFound = true;
                            const diffMinutes = prayerMinutes - nowInMinutes;
                            const hoursLeft = Math.floor(diffMinutes / 60);
                            const minsLeft = diffMinutes % 60;
                            
                            statusEl.textContent = `-${hoursLeft}j ${minsLeft}m`;
                            statusEl.className = 'text-xs mt-1 px-2 py-1 rounded-full inline-block';
                            statusEl.style.backgroundColor = '#c8f7f0';
                            statusEl.style.color = '#428686';
                            
                            // Highlight card
                            prayer.el.classList.add('border-2');
                            prayer.el.style.borderColor = '#428686';
                            
                            // Highlight icon and time
                            prayer.el.querySelector('p.font-bold').style.color = '#428686';
                        } else {
                            // Upcoming (Later)
                            statusEl.textContent = 'MENUNGGU';
                            statusEl.className = 'text-gray-400 text-xs mt-1';
                            prayer.el.style.borderColor = 'transparent';
                            prayer.el.classList.remove('border-2');
                        }
                    });
                    
                    // Generate Upcoming Schedule (Tomorrow onwards)
                    jadwalContainer.innerHTML = '';
                    if (today.getDate() === allDays.length) {
                        jadwalContainer.innerHTML = '<p class="text-sm text-gray-500 text-center py-4">Sisa hari di bulan ini sudah habis.</p>';
                    } else {
                        for (let i = today.getDate(); i < allDays.length; i++) {
                            const dayData = allDays[i];
                            const t = dayData.timings;
                            
                            // Masehi date parsing
                            const dateObj = new Date(dayData.date.readable);
                            const hariNama = hari[dateObj.getDay()];
                            const tanggalNum = dateObj.getDate().toString().padStart(2, '0');
                            const bulanNama = bulan[dateObj.getMonth()];
                            
                            const jadwalHTML = `
                                <div class="rounded-2xl p-4 shadow-sm" style="background-color: #DFEFF6;">
                                    <p class="text-gray-800 font-semibold mb-3">${hariNama}, ${tanggalNum} ${bulanNama}</p>
                                    <div class="flex justify-between text-sm">
                                        <div>
                                            <p class="text-xs mb-1" style="color: #165273;">IMSAK</p>
                                            <p class="font-bold text-gray-800">${getCleanTime(t.Imsak)}</p>
                                        </div>
                                        <div>
                                            <p class="text-xs mb-1" style="color: #437C9F;">SUBUH</p>
                                            <p class="font-bold text-gray-800">${getCleanTime(t.Fajr)}</p>
                                        </div>
                                        <div>
                                            <p class="text-xs mb-1" style="color: #ec407a;">MAGHRIB</p>
                                            <p class="font-bold text-gray-800">${getCleanTime(t.Maghrib)}</p>
                                        </div>
                                    </div>
                                </div>
                            `;
                            jadwalContainer.innerHTML += jadwalHTML;
                        }
                    }
                })
                .catch(err => {
                    console.error('Error fetching prayer times', err);
                    jadwalContainer.innerHTML = '<p class="text-sm text-red-500 text-center py-4">Gagal memuat jadwal. Periksa koneksi internet Anda.</p>';
                });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiblat - Aplikasi Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(to bottom, #DFEFF6 0%, #ffffff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .compass-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border-radius: 50%;
            background: white;
            border: 3px solid #437C9F;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .compass-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .compass-needle {
            position: absolute;
            width: 6px;
            height: 120px;
            background: linear-gradient(to top, #165273, #215472);
            border-radius: 3px;
            transform-origin: center 120px;
            transition: transform 0.1s ease-out;
            z-index: 10;
        }
        .compass-center {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #437C9F;
            border-radius: 50%;
            z-index: 11;
        }
        .direction-text {
            position: absolute;
            font-weight: bold;
            font-size: 14px;
            color: #165273;
        }
        .north { top: 15px; left: 50%; transform: translateX(-50%); }
        .east { right: 15px; top: 50%; transform: translateY(-50%); }
        .south { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .west { left: 15px; top: 50%; transform: translateY(-50%); }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        
        <!-- Header -->
        <div class="px-6 pt-6 pb-6" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-arrow-left text-white text-lg"></i>
                </button>
                <div>
                    <h1 class="text-white text-xl font-semibold">Penunjuk Kiblat</h1>
                    <p class="text-white text-sm opacity-90">Arah menuju Baitullah</p>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="px-6 py-8 pb-32">
            
            <!-- Status Message -->
            <div id="statusMessage" class="mb-6 p-4 rounded-2xl text-center" style="background-color: #DFEFF6;">
                <p class="text-sm" style="color: #165273;">Mengakses lokasi dan sensor...</p>
            </div>

            <!-- Compass -->
            <div class="flex justify-center mb-8">
                <div class="compass-container">
                    <div class="compass-circle">
                        <div class="direction-text north">U</div>
                        <div class="direction-text east">T</div>
                        <div class="direction-text south">S</div>
                        <div class="direction-text west">B</div>
                        <div class="compass-needle" id="compassNeedle"></div>
                        <div class="compass-center"></div>
                    </div>
                </div>
            </div>

            <!-- Information -->
            <div class="space-y-4">
                <!-- Arah Kiblat -->
                <div class="p-4 rounded-2xl bg-white border border-gray-100 shadow-sm">
                    <p class="text-gray-500 text-xs mb-1">Arah Kiblat</p>
                    <p class="text-2xl font-bold" style="color: #437C9F;" id="qiblaDirection">--°</p>
                </div>

                <!-- Arah Kompas -->
                <div class="p-4 rounded-2xl bg-white border border-gray-100 shadow-sm">
                    <p class="text-gray-500 text-xs mb-1">Arah Kompas Anda</p>
                    <p class="text-2xl font-bold" style="color: #428686;" id="compassDirection">--°</p>
                </div>

                <!-- Lokasi -->
                <div class="p-4 rounded-2xl bg-white border border-gray-100 shadow-sm">
                    <p class="text-gray-500 text-xs mb-1">Lokasi Anda</p>
                    <p class="text-sm font-semibold text-gray-800" id="locationInfo">Menunggu lokasi...</p>
                </div>

                <!-- Jarak ke Kiblat -->
                <div class="p-4 rounded-2xl bg-white border border-gray-100 shadow-sm">
                    <p class="text-gray-500 text-xs mb-1">Jarak ke Mekah</p>
                    <p class="text-2xl font-bold" style="color: #165273;" id="distanceInfo">-- km</p>
                </div>
            </div>

            <!-- Instructions -->
            <div class="mt-6 p-4 rounded-2xl" style="background-color: #DFEFF6;">
                <p class="text-xs text-gray-700 text-center">
                    <i class="fas fa-info-circle" style="color: #437C9F;"></i>
                    Putar device Anda hingga jarum merah menunjuk ke arah kiblat
                </p>
            </div>

        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 shadow-lg" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="max-w-md mx-auto">
                <div class="flex justify-around items-center py-4 px-6">
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition" onclick="window.location.href='kalender.html'">
                        <i class="fas fa-calendar-alt text-xl"></i>
                        <span class="text-xs">Kalender</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white" onclick="window.location.href='../index.html'">
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center -mt-8 shadow-lg">
                            <i class="fas fa-home text-2xl" style="color: #165273;"></i>
                        </div>
                        <span class="text-xs mt-1">Home</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition">
                        <i class="fas fa-user-circle text-xl"></i>
                        <span class="text-xs">Profil</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Mekah coordinates
        const MEKAH_LAT = 21.4225;
        const MEKAH_LNG = 39.8262;

        let userLat = null;
        let userLng = null;
        let userHeading = 0;
        let qiblaAngle = 0;

        // Calculate Qibla direction
        function calculateQibla(lat, lng) {
            const latRad = (lat * Math.PI) / 180;
            const lngRad = (lng * Math.PI) / 180;
            const mekahLatRad = (MEKAH_LAT * Math.PI) / 180;
            const mekahLngRad = (MEKAH_LNG * Math.PI) / 180;

            const dLng = mekahLngRad - lngRad;

            const y = Math.sin(dLng) * Math.cos(mekahLatRad);
            const x = Math.cos(latRad) * Math.sin(mekahLatRad) - 
                      Math.sin(latRad) * Math.cos(mekahLatRad) * Math.cos(dLng);

            let angle = Math.atan2(y, x) * (180 / Math.PI);
            angle = (angle + 360) % 360;

            return angle;
        }

        // Calculate distance
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371; // Earth radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c);
        }

        // Get user location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    function(position) {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        qiblaAngle = calculateQibla(userLat, userLng);
                        
                        const distance = calculateDistance(userLat, userLng, MEKAH_LAT, MEKAH_LNG);
                        
                        document.getElementById('locationInfo').textContent = 
                            `${userLat.toFixed(4)}°, ${userLng.toFixed(4)}°`;
                        document.getElementById('distanceInfo').textContent = `${distance} km`;
                        document.getElementById('qiblaDirection').textContent = `${Math.round(qiblaAngle)}°`;
                        
                        updateStatus('Lokasi ditemukan. Putar device Anda.');
                    },
                    function(error) {
                        updateStatus('Gagal mengakses lokasi. Periksa izin lokasi Anda.');
                        console.error(error);
                    }
                );
            } else {
                updateStatus('Geolocation tidak didukung browser Anda.');
            }
        }

        // Handle device orientation
        function handleOrientation(event) {
            userHeading = event.alpha || 0;
            
            document.getElementById('compassDirection').textContent = `${Math.round(userHeading)}°`;
            
            // Calculate relative angle
            let relativeAngle = qiblaAngle - userHeading;
            relativeAngle = (relativeAngle + 360) % 360;
            
            // Update needle
            const needle = document.getElementById('compassNeedle');
            needle.style.transform = `rotate(${relativeAngle}deg)`;
        }

        // Request permission for iOS 13+
        function requestPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            updateStatus('Sensor aktif. Putar device Anda.');
                        }
                    })
                    .catch(console.error);
            } else {
                // Non-iOS 13 devices
                window.addEventListener('deviceorientation', handleOrientation);
                updateStatus('Sensor aktif. Putar device Anda.');
            }
        }

        function updateStatus(message) {
            document.getElementById('statusMessage').innerHTML = 
                `<p class="text-sm" style="color: #165273;">${message}</p>`;
        }

        // Initialize
        getLocation();
        requestPermission();
    </script>
    <script src="../navbar.js"></script>
</body>
</html>

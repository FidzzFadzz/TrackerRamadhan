<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Ditandai - Aplikasi Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(to bottom, #DFEFF6 0%, #ffffff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        
        <!-- Header -->
        <div class="px-6 pt-6 pb-6" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-arrow-left text-white text-lg"></i>
                </button>
                <div>
                    <h1 class="text-white text-xl font-semibold">Halaman Ditandai</h1>
                    <p class="text-white text-sm opacity-90">Halaman yang Anda simpan</p>
                </div>
            </div>
        </div>

        <!-- Bookmarked Pages List -->
        <div class="px-6 py-6 pb-32">
            <div class="space-y-0" id="bookmarkedList">
                <!-- Generated by JavaScript -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 shadow-lg" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="max-w-md mx-auto">
                <div class="flex justify-around items-center py-4 px-6">
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition" onclick="window.location.href='kalender.html'">
                        <i class="fas fa-calendar-alt text-xl"></i>
                        <span class="text-xs">Kalender</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white" onclick="window.location.href='../index.html'">
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center -mt-8 shadow-lg">
                            <i class="fas fa-home text-2xl" style="color: #165273;"></i>
                        </div>
                        <span class="text-xs mt-1">Home</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition">
                        <i class="fas fa-user-circle text-xl"></i>
                        <span class="text-xs">Profil</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Data halaman yang ditandai (contoh)
        const bookmarkedPages = [
            { halaman: 1, surah: 'Surah Al-Baqarah', ayat: 'Halaman 1' },
            { halaman: 18, surah: 'Surah Al-Baqarah', ayat: 'Halaman 18' },
            { halaman: 23, surah: 'Surah Al-Baqarah', ayat: 'Halaman 23' },
            { halaman: 24, surah: 'Surah Al-Baqarah', ayat: 'Halaman 24' },
            { halaman: 28, surah: 'Surah Al-Baqarah', ayat: 'Halaman 28' },
            { halaman: 29, surah: 'Surah Al-Baqarah', ayat: 'Halaman 29' },
            { halaman: 33, surah: 'Surah Al-Baqarah', ayat: 'Halaman 33' }
        ];

        // Generate bookmarked pages list
        function generateBookmarkedList() {
            const container = document.getElementById('bookmarkedList');
            container.innerHTML = '';

            bookmarkedPages.forEach((page, index) => {
                const html = `
                    <div class="flex items-center justify-between py-4 px-4 border-b border-gray-200 cursor-pointer hover:bg-gray-50 transition">
                        <div class="flex items-center gap-4 flex-1">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background-color: #DFEFF6;">
                                <span class="text-lg font-bold" style="color: #437C9F;">${page.halaman}</span>
                            </div>
                            <div>
                                <p class="text-gray-800 font-semibold text-sm">${page.surah}</p>
                                <p class="text-gray-500 text-xs">${page.ayat}</p>
                            </div>
                        </div>
                        <button onclick="removeBookmark(${index})" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
                            <i class="fas fa-bookmark text-lg" style="color: #437C9F;"></i>
                        </button>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // Remove bookmark
        function removeBookmark(index) {
            bookmarkedPages.splice(index, 1);
            generateBookmarkedList();
        }

        // Initialize
        generateBookmarkedList();
    </script>
    <script src="../navbar.js"></script>
</body>
</html>

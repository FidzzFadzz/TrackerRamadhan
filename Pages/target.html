<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Target - Aplikasi Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(to bottom, #DFEFF6 0%, #ffffff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 50;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        .modal.active {
            display: flex;
            align-items: flex-end;
        }
        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 30px 30px 0 0;
            padding: 24px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        
        <!-- Header -->
        <div class="px-6 pt-6 pb-6" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="window.history.back()" class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                        <i class="fas fa-arrow-left text-white text-lg"></i>
                    </button>
                    <h1 class="text-white text-xl font-semibold">Kelola Target</h1>
                </div>
                <button onclick="openAddModal()" class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center hover:bg-opacity-30 transition">
                    <i class="fas fa-plus text-white text-lg"></i>
                </button>
            </div>
        </div>

        <!-- Target List -->
        <div class="px-6 py-6 pb-32">
            <div class="space-y-3" id="targetList">
                <!-- Generated by JavaScript -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 shadow-lg" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="max-w-md mx-auto">
                <div class="flex justify-around items-center py-4 px-6">
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition" onclick="window.location.href='kalender.html'">
                        <i class="fas fa-calendar-alt text-xl"></i>
                        <span class="text-xs">Kalender</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white" onclick="window.location.href='../index.html'">
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center -mt-8 shadow-lg">
                            <i class="fas fa-home text-2xl" style="color: #165273;"></i>
                        </div>
                        <span class="text-xs mt-1">Home</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition">
                        <i class="fas fa-user-circle text-xl"></i>
                        <span class="text-xs">Profil</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Add/Edit Modal -->
    <div id="targetModal" class="modal">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold text-gray-800" id="modalTitle">Tambah Target Baru</h2>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100">
                    <i class="fas fa-times text-gray-600"></i>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nama Target</label>
                    <input type="text" id="targetName" placeholder="Contoh: Sholat Subuh" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Deskripsi <span class="text-gray-400 text-xs">(Opsional)</span></label>
                    <textarea id="targetDesc" placeholder="Deskripsi target..." class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-400 resize-none" rows="3"></textarea>
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-3 rounded-xl border-2 border-gray-200 text-gray-700 font-medium hover:bg-gray-50 transition">
                        Batal
                    </button>
                    <button onclick="saveTarget()" class="flex-1 py-3 rounded-xl text-white font-medium transition" style="background: linear-gradient(to right, #165273, #215472);">
                        Simpan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Default targets
        let targets = [
            { id: 1, nama: 'Sholat Subuh', desc: '' },
            { id: 2, nama: 'Sholat Dzuhur', desc: '' },
            { id: 3, nama: 'Sholat Ashar', desc: '' },
            { id: 4, nama: 'Sholat Maghrib', desc: '' },
            { id: 5, nama: 'Sholat Isya', desc: '' },
            { id: 6, nama: 'Tarawih', desc: '' },
            { id: 7, nama: 'Tilawah Quran', desc: '' },
            { id: 8, nama: 'Sedekah', desc: '' },
            { id: 9, nama: 'Puasa', desc: '' }
        ];

        let editingId = null;
        let nextId = 10;

        // Generate target list
        function generateTargetList() {
            const container = document.getElementById('targetList');
            container.innerHTML = '';

            targets.forEach(target => {
                const html = `
                    <div class="flex items-center justify-between p-4 rounded-2xl bg-white border border-gray-100 shadow-sm hover:shadow-md transition">
                        <div class="flex-1 cursor-pointer" onclick="editTarget(${target.id})">
                            <p class="text-gray-800 font-semibold text-sm">${target.nama}</p>
                            ${target.desc ? `<p class="text-gray-500 text-xs">${target.desc}</p>` : ''}
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editTarget(${target.id})" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
                                <i class="fas fa-edit text-sm" style="color: #437C9F;"></i>
                            </button>
                            <button onclick="deleteTarget(${target.id})" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
                                <i class="fas fa-trash text-sm" style="color: #ec407a;"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // Open add modal
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Tambah Target Baru';
            document.getElementById('targetName').value = '';
            document.getElementById('targetDesc').value = '';
            document.getElementById('targetModal').classList.add('active');
        }

        // Edit target
        function editTarget(id) {
            const target = targets.find(t => t.id === id);
            if (target) {
                editingId = id;
                document.getElementById('modalTitle').textContent = 'Edit Target';
                document.getElementById('targetName').value = target.nama;
                document.getElementById('targetDesc').value = target.desc;
                document.getElementById('targetModal').classList.add('active');
            }
        }

        // Save target
        function saveTarget() {
            const name = document.getElementById('targetName').value.trim();
            const desc = document.getElementById('targetDesc').value.trim();

            if (!name) {
                alert('Nama target tidak boleh kosong');
                return;
            }

            if (editingId) {
                // Update existing
                const target = targets.find(t => t.id === editingId);
                if (target) {
                    target.nama = name;
                    target.desc = desc;
                }
            } else {
                // Add new
                targets.push({
                    id: nextId++,
                    nama: name,
                    desc: desc
                });
            }

            closeModal();
            generateTargetList();
        }

        // Delete target
        function deleteTarget(id) {
            if (confirm('Apakah Anda yakin ingin menghapus target ini?')) {
                targets = targets.filter(t => t.id !== id);
                generateTargetList();
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('targetModal').classList.remove('active');
            editingId = null;
        }

        // Close modal when clicking outside
        document.getElementById('targetModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialize
        generateTargetList();
    </script>
    <script src="../navbar.js"></script>
</body>
</html>

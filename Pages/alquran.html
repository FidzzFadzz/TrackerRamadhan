        // Generate surah list
        function generateSurahList(filter = '') {
            const container = document.querySelector('[id="surahList"]');
            container.innerHTML = '';

            const filtered = surahData.filter(surah => 
                surah.nama.toLowerCase().includes(filter.toLowerCase()) ||
                surah.arab.includes(filter)
            );

            filtered.forEach(surah => {
                const html = `
                    <div class="flex items-center justify-between p-4 rounded-2xl bg-white border border-gray-100 cursor-pointer hover:shadow-md transition" onclick="window.location.href='surah.html?id=${surah.no}'">
                        <div class="flex items-center gap-3 flex-1">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background-color: #DFEFF6;">
                                <span class="text-lg font-bold" style="color: #437C9F;">${surah.no}</span>
                            </div>
                            <div>
                                <p class="text-gray-800 font-semibold text-sm">${surah.nama}</p>
                                <p class="text-gray-500 text-xs">${surah.lokasi} • ${surah.ayat} AYAT</p>
                            </div>
                        </div>
                        <p class="text-gray-400 text-right text-sm" style="direction: rtl;">${surah.arab}</p>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // Initialize
        generateSurahList();

        // Search functionality
        const searchInput = document.querySelector('input[type="text"]');
        searchInput.addEventListener('input', function() {
            generateSurahList(this.value);
        });

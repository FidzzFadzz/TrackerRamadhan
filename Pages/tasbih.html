<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasbih - Aplikasi Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #c8e6f5 0%, #DFEFF6 50%, #e8f4f8 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .counter-circle {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
            border: 5px solid #437C9F;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(22, 82, 115, 0.15);
            position: relative;
        }
        .counter-circle:active {
            transform: scale(0.95);
            box-shadow: 0 4px 12px rgba(22, 82, 115, 0.2);
        }
        .progress-ring {
            position: absolute;
            width: 260px;
            height: 260px;
            transform: rotate(-90deg);
        }
        .progress-ring-circle {
            transition: stroke-dashoffset 0.5s ease;
            stroke: #437C9F;
            fill: none;
            stroke-linecap: round;
        }
        .counter-number {
            font-size: 72px;
            font-weight: bold;
            color: #165273;
            position: relative;
            z-index: 2;
        }
        .tahmid-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
            border-radius: 30px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(22, 82, 115, 0.1);
            border: 2px solid rgba(67, 124, 159, 0.2);
        }
        .nav-button {
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(22, 82, 115, 0.08);
        }
        .nav-button:hover {
            box-shadow: 0 4px 12px rgba(22, 82, 115, 0.15);
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        
        <!-- Header -->
        <div class="px-6 pt-6 pb-6" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="flex items-center justify-between">
                <button onclick="window.history.back()" class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                    <i class="fas fa-arrow-left text-white text-lg"></i>
                </button>
                <h1 class="text-white text-xl font-semibold">Tasbih</h1>
                <button id="soundToggle" class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center" onclick="toggleSound()">
                    <i class="fas fa-volume-up text-white text-lg"></i>
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="px-6 py-8 pb-32 flex flex-col items-center">
            
            <!-- Tahmid Card -->
            <div class="tahmid-card mb-8 w-full">
                <p class="text-sm font-semibold mb-3" style="color: #428686;">TAHMID</p>
                <p class="text-4xl font-bold mb-3 text-gray-800" id="arabText">سبحان الله</p>
                <p class="text-gray-600 text-sm" id="transliteration">"Subhanallah"</p>
            </div>

            <!-- Counter Circle -->
            <div class="mb-12" onclick="incrementCounter()">
                <div class="counter-circle">
                    <svg class="progress-ring" id="progressRing">
                        <circle class="progress-ring-circle" stroke-width="5" r="125" cx="130" cy="130" />
                    </svg>
                    <div class="text-center">
                        <div class="counter-number" id="counterValue">0</div>
                    </div>
                </div>
            </div>

            <!-- Target -->
            <p class="text-sm font-semibold mb-8" style="color: #437C9F;">TARGET: <span id="targetValue">33</span></p>

            <!-- Navigation Buttons -->
            <div class="flex items-center justify-center gap-4 w-full">
                <button onclick="previousTasbih()" class="nav-button w-12 h-12 rounded-full bg-white border-2 border-gray-200 flex items-center justify-center hover:bg-gray-50 transition">
                    <i class="fas fa-chevron-left text-gray-600"></i>
                </button>
                
                <button onclick="resetCounter()" class="nav-button flex-1 py-3 rounded-full bg-white border-2 border-gray-200 flex items-center justify-center gap-2 hover:bg-gray-50 transition">
                    <i class="fas fa-redo text-gray-600"></i>
                    <span class="text-gray-700 font-medium">Reset</span>
                </button>
                
                <button onclick="nextTasbih()" class="nav-button w-12 h-12 rounded-full bg-white border-2 border-gray-200 flex items-center justify-center hover:bg-gray-50 transition">
                    <i class="fas fa-chevron-right text-gray-600"></i>
                </button>
            </div>

        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 shadow-lg" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="max-w-md mx-auto">
                <div class="flex justify-around items-center py-4 px-6">
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition" onclick="window.location.href='kalender.html'">
                        <i class="fas fa-calendar-alt text-xl"></i>
                        <span class="text-xs">Kalender</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white" onclick="window.location.href='../index.html'">
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center -mt-8 shadow-lg">
                            <i class="fas fa-home text-2xl" style="color: #165273;"></i>
                        </div>
                        <span class="text-xs mt-1">Home</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition">
                        <i class="fas fa-user-circle text-xl"></i>
                        <span class="text-xs">Profil</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Data tasbih
        const tasbihData = [
            {
                name: 'Subhanallah',
                arab: 'سبحان الله',
                transliteration: '"Subhanallah"',
                target: 33
            },
            {
                name: 'Alhamdulillah',
                arab: 'الحمد لله',
                transliteration: '"Alhamdulillah"',
                target: 33
            },
            {
                name: 'Allahu Akbar',
                arab: 'الله أكبر',
                transliteration: '"Allahu Akbar"',
                target: 34
            }
        ];

        let currentTasbih = 0;
        let counter = 0;
        let soundEnabled = true;

        // Initialize
        function init() {
            updateDisplay();
        }

        // Update display
        function updateDisplay() {
            const tasbih = tasbihData[currentTasbih];
            document.getElementById('arabText').textContent = tasbih.arab;
            document.getElementById('transliteration').textContent = tasbih.transliteration;
            document.getElementById('targetValue').textContent = tasbih.target;
            document.getElementById('counterValue').textContent = counter;
            updateProgressRing();
        }

        // Update progress ring
        function updateProgressRing() {
            const tasbih = tasbihData[currentTasbih];
            const circle = document.querySelector('.progress-ring-circle');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            
            const progress = counter / tasbih.target;
            const offset = circumference - (progress * circumference);
            
            circle.style.strokeDasharray = circumference + ' ' + circumference;
            circle.style.strokeDashoffset = offset;
        }

        // Increment counter
        function incrementCounter() {
            const tasbih = tasbihData[currentTasbih];
            if (counter < tasbih.target) {
                counter++;
                playSound();
                updateDisplay();
                
                // Auto move to next tasbih when target reached
                if (counter === tasbih.target) {
                    setTimeout(() => {
                        nextTasbih();
                    }, 500);
                }
            }
        }

        // Reset counter
        function resetCounter() {
            counter = 0;
            updateDisplay();
        }

        // Next tasbih
        function nextTasbih() {
            currentTasbih = (currentTasbih + 1) % tasbihData.length;
            counter = 0;
            updateDisplay();
        }

        // Previous tasbih
        function previousTasbih() {
            currentTasbih = (currentTasbih - 1 + tasbihData.length) % tasbihData.length;
            counter = 0;
            updateDisplay();
        }

        // Toggle sound
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const icon = document.getElementById('soundToggle').querySelector('i');
            if (soundEnabled) {
                icon.classList.remove('fa-volume-mute');
                icon.classList.add('fa-volume-up');
            } else {
                icon.classList.remove('fa-volume-up');
                icon.classList.add('fa-volume-mute');
            }
        }

        // Play sound
        function playSound() {
            if (soundEnabled) {
                // Vibration API
                if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
                
                // Audio beep
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.1);
                } catch (e) {
                    console.log('Audio context not available');
                }
            }
        }

        // Initialize on load
        init();
    </script>
    <script src="../navbar.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Juz - Aplikasi Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(to bottom, #DFEFF6 0%, #ffffff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        
        <!-- Header -->
        <div class="px-6 pt-6 pb-6" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <button onclick="window.history.back()" class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                        <i class="fas fa-arrow-left text-white text-lg"></i>
                    </button>
                    <i class="fas fa-book text-white text-2xl"></i>
                    <h1 class="text-white text-lg font-semibold">Al-Qur'an</h1>
                </div>
                <button class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                    <i class="fas fa-bookmark text-white text-lg"></i>
                </button>
            </div>

            <!-- Search Bar -->
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" placeholder="Cari juz..." class="w-full pl-10 pr-4 py-3 rounded-full bg-white text-gray-800 placeholder-gray-400 focus:outline-none">
            </div>
        </div>

        <!-- Tabs/Filter -->
        <div class="px-6 py-4 bg-white border-b border-gray-200">
            <div class="flex gap-3">
                <button class="px-6 py-2 rounded-full text-sm font-medium" style="background-color: #DFEFF6; color: #165273; border: 2px solid #DFEFF6;" onclick="window.location.href='alquran.html'">
                    Surah
                </button>
                <button class="px-6 py-2 rounded-full text-sm font-medium" style="background-color: white; color: #437C9F; border: 2px solid #437C9F;">
                    Juz
                </button>
            </div>
        </div>

        <!-- Juz Grid -->
        <div class="px-4 py-6 pb-32">
            <div class="grid grid-cols-2 gap-4" id="juzGrid">
                <!-- Generated by JavaScript -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 shadow-lg" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="max-w-md mx-auto">
                <div class="flex justify-around items-center py-4 px-6">
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition" onclick="window.location.href='../index.html'">
                        <i class="fas fa-calendar-alt text-xl"></i>
                        <span class="text-xs">Kalender</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white" onclick="window.location.href='../index.html'">
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center -mt-8 shadow-lg">
                            <i class="fas fa-home text-2xl" style="color: #165273;"></i>
                        </div>
                        <span class="text-xs mt-1">Home</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition">
                        <i class="fas fa-user-circle text-xl"></i>
                        <span class="text-xs">Profil</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Data 30 Juz
        const juzData = Array.from({ length: 30 }, (_, i) => ({
            no: i + 1,
            nama: `Juz ${i + 1}`,
            surah: i === 0 ? 'Al-Fatihah' : i === 1 ? 'Al-Baqarah' : 'Surah'
        }));

        // Generate Juz Grid
        function generateJuzGrid(filter = '') {
            const container = document.getElementById('juzGrid');
            container.innerHTML = '';

            const filtered = juzData.filter(juz => 
                juz.nama.toLowerCase().includes(filter.toLowerCase()) ||
                juz.no.toString().includes(filter)
            );

            filtered.forEach(juz => {
                const html = `
                    <div class="flex flex-col items-center justify-center p-6 rounded-3xl bg-white border border-gray-100 cursor-pointer hover:shadow-md transition min-h-40">
                        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-3" style="background-color: #DFEFF6;">
                            <img src="../Asset/Logo Alquran.png" alt="Al-Qur'an" class="w-12 h-12 object-contain">
                        </div>
                        <p class="text-gray-800 font-semibold text-base text-center">Juz ${juz.no}</p>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // Initialize
        generateJuzGrid();

        // Search functionality
        const searchInput = document.querySelector('input[type="text"]');
        searchInput.addEventListener('input', function() {
            generateJuzGrid(this.value);
        });

        // Tab switching
        const surahTab = document.querySelectorAll('button')[3]; // Surah button
        const juzTab = document.querySelectorAll('button')[4]; // Juz button

        surahTab.addEventListener('click', function() {
            window.location.href = 'alquran.html';
        });
    </script>
</body>
</html>

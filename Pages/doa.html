<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumpulan Doa - Aplikasi Islami</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(to bottom, #DFEFF6 0%, #ffffff 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        
        <!-- Header -->
        <div class="px-6 pt-6 pb-6" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <button onclick="window.history.back()" class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                        <i class="fas fa-arrow-left text-white text-lg"></i>
                    </button>
                    <h1 class="text-white text-xl font-semibold">Kumpulan Doa</h1>
                </div>
                <button class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                    <i class="fas fa-bookmark text-white text-lg"></i>
                </button>
            </div>

            <!-- Search Bar -->
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" placeholder="Cari kategori..." class="w-full pl-10 pr-4 py-3 rounded-full bg-white text-gray-800 placeholder-gray-400 focus:outline-none">
            </div>
        </div>

        <!-- Doa Categories Grid -->
        <div class="px-4 py-6 pb-32">
            <div class="space-y-3" id="doaGrid">
                <!-- Generated by JavaScript -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 shadow-lg" style="background: linear-gradient(to right, #165273, #215472);">
            <div class="max-w-md mx-auto">
                <div class="flex justify-around items-center py-4 px-6">
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition" onclick="window.location.href='../index.html'">
                        <i class="fas fa-calendar-alt text-xl"></i>
                        <span class="text-xs">Kalender</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white" onclick="window.location.href='../index.html'">
                        <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center -mt-8 shadow-lg">
                            <i class="fas fa-home text-2xl" style="color: #165273;"></i>
                        </div>
                        <span class="text-xs mt-1">Home</span>
                    </button>
                    <button class="flex flex-col items-center gap-1 text-white opacity-60 hover:opacity-100 transition">
                        <i class="fas fa-user-circle text-xl"></i>
                        <span class="text-xs">Profil</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Data kategori doa
        const doaCategories = [
            { 
                id: 1, 
                nama: 'Doa Harian', 
                deskripsi: 'Kumpulan doa aktivitas...',
                icon: 'fa-sun'
            },
            { 
                id: 2, 
                nama: 'Wirid & Tahlil', 
                deskripsi: 'Susunan dzikir setelah shalat...',
                icon: 'fa-book'
            },
            { 
                id: 3, 
                nama: 'Bilal & Tarawih', 
                deskripsi: 'Panduan bilal shalat tarawih...',
                icon: 'fa-users'
            },
            { 
                id: 4, 
                nama: 'Sholawat', 
                deskripsi: 'Kumpulan sholawat Nabi...',
                icon: 'fa-heart'
            },
            { 
                id: 5, 
                nama: 'Al-Ma\'tsurat Pagi', 
                deskripsi: 'Dziki pagi hari',
                icon: 'fa-sunrise'
            },  
            { 
                id: 6, 
                nama: 'Al-Ma\'tsurat Petang', 
                deskripsi: 'Dziki sore hari',
                icon: 'fa-sunset'
            },
            { 
                id: 7, 
                nama: 'Asmaul Husna', 
                deskripsi: '99 Nama Allah beserta...',
                icon: 'fa-star'
            },
        ];

        // Generate doa grid
        function generateDoaGrid(filter = '') {
            const container = document.getElementById('doaGrid');
            container.innerHTML = '';

            const filtered = doaCategories.filter(doa => 
                doa.nama.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(doa => {
                const isHighlight = doa.highlight;
                const html = `
                    <div class="flex items-center gap-4 p-4 rounded-2xl bg-white border border-gray-200 cursor-pointer hover:shadow-md transition shadow-sm">
                        <div class="w-14 h-14 rounded-xl flex items-center justify-center flex-shrink-0" style="background-color: #DFEFF6;">
                            <i class="fas ${doa.icon} text-2xl" style="color: ${isHighlight ? '#ff6b9d' : '#437C9F'};"></i>
                        </div>
                        <div class="flex-1 text-left">
                            <p class="text-gray-800 font-semibold text-sm">${doa.nama}</p>
                            <p class="text-gray-500 text-xs">${doa.deskripsi}</p>
                        </div>
                        ${isHighlight ? `<div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background-color: #ff6b9d;"><i class="fas fa-heart text-white text-sm"></i></div>` : ''}
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // Initialize
        generateDoaGrid();

        // Search functionality
        const searchInput = document.querySelector('input[type="text"]');
        searchInput.addEventListener('input', function() {
            generateDoaGrid(this.value);
        });
    </script>
</body>
</html>
